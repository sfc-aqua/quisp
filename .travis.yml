language: cpp

jobs:
  - os: linux
    dist: trusty
    compiler: gcc
    env:
      - COMPILER=g++-9.2
    addons:
      apt:
        sources: ['ubuntu-toolchain-r-test']

services:
  - docker

install:
  - docker build -f ./Dockerfile.travis -t quisp .

script:
  - bash docker_run_lint.sh
  - docker run --rm -i -v "$TRAVIS_BUILD_DIR:/root/quisp" quisp /bin/sh -c "cd /root/quisp/; make ci" || travis_terminate 1;
  - docker run --rm -i -v "$TRAVIS_BUILD_DIR:/root/quisp" quisp /bin/sh -c "cd /root/quisp/test; /bin/bash test.sh" || travis_terminate 1;
  - cd test && sudo python -m unittest discover && sudo rm testresults.txt && echo "test done" || travis_terminate 1;
