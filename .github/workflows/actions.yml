name: check quisp
on: [push, pull_request]
jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    container:
      image: omnetpp/omnetpp:u18.04-5.6.2
      # volumes:
      #   - ./:/root/quisp
    steps:
      - name: Install the latest git and dependencies
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends software-properties-common cmake g++ clang-format clang-tidy
          add-apt-repository ppa:git-core/ppa
          apt-get update -y
          apt-get install git -y
      - name: Check out repository
        uses: actions/checkout@v2
      - name: clang-format, unit-test, clang-tidy
        run: make ci
      - name: Run Simulations
        run: ls -la && cd test && /bin/bash test.sh
      - name: Check Simulation Results
        run: cd test && python -m unittest discover && rm testresults.txt && echo "test done"

