name: check quisp
on: [push, pull_request]
jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    container:
      image: omnetpp/omnetpp:u18.04-5.6.2
      # volumes:
      #   - ./:/root/quisp
    steps:
      - name: Check out repository
        uses: actions/checkout@v2
      - run: cd /root/quisp && make ci
      - run: cd /root/quisp/test && /bin/bash test.sh
      - run: cd /root/quisp/test && sudo python -m unittest discover && sudo rm testresults.txt && echo "test done"
